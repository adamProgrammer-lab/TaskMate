<ion-header>
  <ion-toolbar color="secondary">
    <ion-title>Mis Tareas</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content>
  <ion-searchbar
    placeholder="Buscar tarea..."
    debounce="250"
    (ionInput)="filterTasks($event)"
  ></ion-searchbar>

  <ion-segment [(ngModel)]="selectedFilter" (ionChange)="applyFilter()">
    <ion-segment-button value="all">
      <ion-label>Todas</ion-label>
    </ion-segment-button>
    <ion-segment-button value="pending">
      <ion-label>Pendientes</ion-label>
    </ion-segment-button>
    <ion-segment-button value="done">
      <ion-label>Hechas</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list *ngIf="filteredTasks.length > 0">
    @for (task of filteredTasks; track task.id) {
      <ion-item button detail="true" (click)="goToDetail(task.id)">
        <ion-checkbox
          slot="start"
          [(ngModel)]="task.completed"
          (click)="$event.stopPropagation()"
          (ngModelChange)="onToggle(task)"
        ></ion-checkbox>
        <ion-label [class.completed]="task.completed">
          <h2>{{ task.title }}</h2>
          <p>{{ task.description || 'Sin descripcion' }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="getPriorityColor(task)">
          {{ task.priority }}
        </ion-badge>
      </ion-item>
    }
  </ion-list>

  <div *ngIf="filteredTasks.length === 0" class="empty-state ion-text-center ion-padding">
    <ion-icon name="clipboard-outline" size="large" color="medium"></ion-icon>
    <h3>No hay tareas</h3>
    <p>Crea tu primera tarea con el boton +</p>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="openAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
